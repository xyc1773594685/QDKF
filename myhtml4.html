<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document-React</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>  
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App(){
            const [num, setNum] = React.useState(0)
            const isShow = true

            return (
                <div>
                    <button onClick={() => {setNum(num + 1)}}>+1</button>
                    <div>我是是{num}</div>
                    {isShow ? <div> 显示 </div> : <div> 隐藏 </div>}
                </div>                
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'))

        root.render(<App />)
    </script>
</body>
</html>
